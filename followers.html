<div id="egmFollowersBadge" style="
    display:inline-block;
    padding:10px 18px;
    border-radius:999px;
    font-weight:700;
    font-size:18px;
    background:#7fe9ee;
    color:#0b2b2c;
    margin:14px 0 18px 0;
">
Loading followers...
</div>

<script>
(async function () {
  try {

    const SUPABASE_URL = "https://xaignsoucwzdgembhbdn.supabase.co";
    const API_KEY = "sb_publishable_ChbPK6MxO18sUcJWVOdFMA_L4xKl7yE";

    const url =
      SUPABASE_URL +
      "/rest/v1/playlist_stats?select=total_followers,updated_at&order=updated_at.desc&limit=1";

    const res = await fetch(url, {
      headers: {
        apikey: API_KEY,
        Authorization: "Bearer " + API_KEY
      }
    });

    const data = await res.json();

    const total =
      data &&
      data.length > 0 &&
      data[0].total_followers
        ? data[0].total_followers
        : null;

    const el = document.getElementById("egmFollowersBadge");

    if (!el) return;

    if (total === null) {
      el.textContent = "Playlist Followers";
      return;
    }

    el.textContent =
      total.toLocaleString() + " Playlist Followers";

  } catch (e) {
    const el = document.getElementById("egmFollowersBadge");
    if (el) el.textContent = "Playlist Followers";
    console.error(e);
  }
})();
</script>
